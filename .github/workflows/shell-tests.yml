name: Shell tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bash tests
        shell: bash
        run: |
          status=0
          for t in tests/*.sh; do
            echo "== $t =="
            bash "$t" || status=1
          done
          exit "$status"
