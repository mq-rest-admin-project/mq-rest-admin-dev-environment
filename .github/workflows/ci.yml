name: CI

on:
  pull_request:
  workflow_call:
    inputs:
      run-security:
        type: string
        default: "true"
      run-release:
        type: string
        default: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  common:
    name: "quality / common"
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run common quality checks
        run: st-validate --check common

  shellcheck:
    name: "quality / shellcheck"
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run shellcheck
        run: |
          files=$(find scripts -type f \( -name '*.sh' -o -path '*/git-hooks/*' \) | sort)
          if [ -n "$files" ]; then
            echo "$files" | xargs shellcheck
          else
            echo "No shell scripts found."
          fi

  actionlint:
    name: "quality / actionlint"
    runs-on: ubuntu-latest
    container: ghcr.io/wphillipmoore/dev-base:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        run: actionlint

  security:
    if: ${{ inputs.run-security != 'false' }}
    uses: wphillipmoore/standard-actions/.github/workflows/ci-security.yml@v1.5
    permissions:
      contents: read
      security-events: write
    with:
      language: shell
      run-codeql: false

  release:
    if: ${{ inputs.run-release != 'false' }}
    uses: wphillipmoore/standard-actions/.github/workflows/ci-release.yml@v1.5
    permissions:
      contents: read
    with:
      language: shell
